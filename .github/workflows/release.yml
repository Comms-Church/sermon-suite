name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Verify tag matches plugin version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PLUGIN_VERSION=$(grep -oP "Version:\s*\K[0-9.]+" sermon-suite.php | head -1)
          echo "Tag version:    $TAG_VERSION"
          echo "Plugin version: $PLUGIN_VERSION"
          if [ "$TAG_VERSION" != "$PLUGIN_VERSION" ]; then
            echo "::error::Tag ($TAG_VERSION) does not match plugin header version ($PLUGIN_VERSION)."
            exit 1
          fi

      - name: Build plugin zip
        run: |
          set -e
          mkdir -p build/sermon-suite
          for item in *; do
            case "$item" in
              build) ;;
              *) cp -r "$item" build/sermon-suite/ ;;
            esac
          done
          rm -rf build/sermon-suite/.git
          rm -rf build/sermon-suite/.github
          rm -f  build/sermon-suite/.gitignore
          rm -f  build/sermon-suite/*.md
          cd build
          zip -r sermon-suite.zip sermon-suite -q
          echo "=== Built zip contents ==="
          unzip -l sermon-suite.zip | head -20

      - name: Attach zip to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/sermon-suite.zip
          generate_release_notes: true
